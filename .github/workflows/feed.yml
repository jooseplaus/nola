name: Nola Meta Feed

on:
  schedule:
    - cron: '0 * * * *'   # iga tunni alguses
  workflow_dispatch:        # käsitsi käivitamine GitHubist

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate feed
        run: python nola_meta_feed.py

      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nola_meta_feed_fi.xml
          git diff --cached --quiet || git commit -m "feed: auto-update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
